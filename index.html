<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You, እድል</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Serif+Ethiopic:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #050000;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* ----- Login Screen ----- */
        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a0005, #000000);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
            transition: opacity 1s ease-in-out;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px; border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 77, 109, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            width: 80%; max-width: 350px;
        }

        .login-box h2 {
            font-family: 'Dancing Script', cursive; font-size: 2.5rem;
            color: #ff4d6d; margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.8);
        }

        .login-box input {
            width: 80%; padding: 12px; font-size: 20px;
            border: 2px solid #ff4d6d; border-radius: 10px;
            background: rgba(0,0,0,0.5); color: #fff;
            text-align: center; outline: none; letter-spacing: 5px;
        }

        .login-box button {
            margin-top: 20px; padding: 12px 30px; font-size: 18px;
            color: #fff; background: linear-gradient(45deg, #ff4d6d, #cc0033);
            border: none; border-radius: 10px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.5);
            font-weight: bold; width: 80%;
        }

        #error-msg { color: #ff4d6d; margin-top: 15px; opacity: 0; font-size: 14px; }

        /* ----- Main Content ----- */
        #main-content {
            display: none; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* ፎቶ መቀያየሪያ ከጀርባ */
        .slideshow { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .slide {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 2s ease-in-out, transform 4s linear;
            transform: scale(1.1);
        }
        .slide.active { opacity: 0.35; transform: scale(1); } /* Darkened so text is readable */

        .overlay {
            position: absolute; width: 100%; height: 100%; z-index: 2;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%);
        }

        /* ----- ፊት ለፊት ያለው ይዘት (አሁን እንዳይጨናነቅ Flexbox ተጠቅሜያለሁ) ----- */
        .content-container {
            position: absolute; z-index: 10;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        /* የልቡ ፎቶ መያዣ */
        .heart-wrapper {
            width: 200px; height: 200px; /* ፎቶው ባይኖርም ቦታው አይበላሽም */
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px;
        }

        .real-heart {
            width: 100%; height: auto;
            max-width: 250px;
            animation: fastBeat 0.6s infinite alternate;
            filter: drop-shadow(0 0 25px rgba(255, 0, 50, 0.9));
            mix-blend-mode: lighten; /* የፎቶውን ጥቁር ባክግራውንድ ያጠፋል */
        }

        @keyframes fastBeat {
            0% { transform: scale(1); }
            100% { transform: scale(1.18); filter: drop-shadow(0 0 45px rgba(255, 0, 50, 1)); }
        }

        /* ፅሁፎች */
        .eng-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem; color: #fff; margin: 0;
            text-shadow: 0 0 15px #ff4d6d, 0 0 30px #ff4d6d;
        }

        .amh-text {
            font-family: 'Noto Serif Ethiopic', serif; /* የሚያምር የአማርኛ ፎንት */
            font-size: 3.5rem; color: #fff; margin: -10px 0 0 0;
            text-shadow: 0 0 15px #ff4d6d, 0 0 30px #ff4d6d;
        }

        .quote {
            font-family: serif; font-style: italic; font-size: 1.1rem;
            color: #ffb3c6; max-width: 85%; margin-top: 30px;
            text-shadow: 1px 1px 5px #000;
            line-height: 1.5;
            opacity: 0; animation: fadeInText 3s forwards 1.5s;
        }

        @keyframes fadeInText { to { opacity: 1; } }

        /* ተንሳፋፊ ልቦች */
        #floating-hearts { position: absolute; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        .float-heart {
            position: absolute; bottom: -20px; color: #ff4d6d;
            animation: floatUp 4s linear infinite; opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="Song.MP3" loop preload="auto"></audio>

    <div id="login-screen">
        <div class="login-box">
            <h2>For You, My Love</h2>
            <input type="password" id="password" placeholder="Code" maxlength="4">
            <br>
            <button onclick="unlock()">Unlock My Heart</button>
            <p id="error-msg">Incorrect Password!</p>
        </div>
    </div>

    <div id="main-content">
        
        <div class="slideshow">
            <div class="slide active" style="background-image: url('25757.jpg');"></div>
            <div class="slide" style="background-image: url('25754.jpg');"></div>
            <div class="slide" style="background-image: url('25756.jpg');"></div>
        </div>
        
        <div class="overlay"></div>
        <div id="floating-hearts"></div>

        <div class="content-container">
            <div class="heart-wrapper">
                <img src="25811.jpg" alt="" class="real-heart">
            </div>
            
            <h1 class="eng-text">I love You</h1>
            <h1 class="amh-text">እድል</h1>
            
            <p class="quote">"My heart beats faster every time I think of you.<br>You are my only choice, today and forever."</p>
        </div>

    </div>

    <script>
        function unlock() {
            const pass = document.getElementById("password").value;
            const error = document.getElementById("error-msg");
            const login = document.getElementById("login-screen");
            const main = document.getElementById("main-content");
            const music = document.getElementById("bgMusic");

            if (pass === "2531") {
                error.style.opacity = "0";
                
                // ድምፁ ወዲያውኑ ይጀምራል
                music.play().catch(e => console.log("Audio Error"));

                login.style.opacity = "0";
                setTimeout(() => {
                    login.style.display = "none";
                    main.style.display = "block";
                    startSlideshow();
                    createHearts();
                }, 1000);

            } else {
                error.style.opacity = "1";
            }
        }

        function startSlideshow() {
            const slides = document.querySelectorAll(".slide");
            let current = 0;
            setInterval(() => {
                slides[current].classList.remove("active");
                current = (current + 1) % slides.length;
                slides[current].classList.add("active");
            }, 3500); // ፎቶው በየ 3.5 ሰከንድ ይቀየራል
        }

        function createHearts() {
            const container = document.getElementById("floating-hearts");
            setInterval(() => {
                const h = document.createElement("div");
                h.innerHTML = "❤";
                h.classList.add("float-heart");
                h.style.left = Math.random() * 100 + "vw";
                h.style.fontSize = (Math.random() * 15 + 10) + "px";
                h.style.animationDuration = (Math.random() * 3 + 3) + "s";
                container.appendChild(h);
                setTimeout(() => h.remove(), 6000);
            }, 400);
        }
    </script>
</body>
</html>
